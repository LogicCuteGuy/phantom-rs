name: Build Binaries

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: phantom-rs-linux
            binary_path: target/release/phantom-rs
          - os: macos-latest
            artifact_name: phantom-rs-macos
            binary_path: target/release/phantom-rs
          - os: windows-latest
            artifact_name: phantom-rs-windows
            binary_path: target/release/phantom-rs.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --bin phantom-rs

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error